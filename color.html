<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="heading">Change My Color</h1>

    <input type="text" id="input">

    <button id="my-btn" onclick="changeColor()">
        Change Color
    </button>
    

    <script>
        function changeColor(){
            let colorValue=document.getElementById("input").value;
            document.getElementById("heading").style.color=colorValue;
            document.getElementById("heading").style.fontFamily="Verdana"

        }


        document.getElementById("heading").addEventListener("mouseenter",function(){
            document.getElementById("heading").style.color="brown";
        })

          document.getElementById("heading").addEventListener("mouseleave",function(){
            document.getElementById("heading").style.color="black";
        })


        document.getElementById("my-btn").addEventListener("click",function(){
            alert("hello");
        })


    </script>
</body>
</html>t
