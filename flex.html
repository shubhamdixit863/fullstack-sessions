<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

     .box{
        width: 300px;
        height: 300px;
        background-color: aquamarine;
        margin: 10px;
     }

     .container{
        display: flex;
        flex-direction: row;  /*.  row  --- > main axis and from left to right   , column -->top to bottom *. row -reverse ,column -reverse/ 
        justify-content: space-evenly;
        /**
        flex-start: Items align to the left side of the container.
flex-end: Items align to the right side of the container.
center: Items align at the center of the container.
space-between: Items display with equal spacing between them.
space-around: Items display with equal spacing around them.
space-evenly:

// align items values
stretch (default)
flex-start  ()
flex-end
center
        **/

        align-items: center;


     }

    </style>
</head>
<body>
    <div class="container">

         <div class="box">
            Green 1

    </div>


    <div class="box">

2
    </div>

  

     

    </div>


     <div class="container">

         <div class="box">
            3

    </div>


    <div class="box">

4
    </div>

  

  

    </div>
   
    
    

</html>
