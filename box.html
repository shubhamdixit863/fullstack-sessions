<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box{
            width: 200px;
            height: 200px;
            background-color:lightblue;
          
           
        }
        #my-box{
            padding:20px;
            border:5px solid black;
            margin: 30px;
            
        }
    </style>
</head>
<body>


    <div class="box" id="my-box">

      


    </div>

    <br>

    <div class="box">

      


    </div>

    <h1 id="heading">Change Color</h1>

    <button id="btn">
     Change Color
    </button>

    <script>

        document.getElementById("btn").addEventListener("click",function(){
            document.getElementById("heading").style.color="green";
            document.getElementById("heading").style.fontSize="large"
        })

    </script>
    
</body>
</html>
